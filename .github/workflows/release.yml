name: Build & Release

# Push a version tag (e.g. v5.0.1) to build installers for BOTH platforms and
# publish them to a GitHub Release. electron-updater reads that release to update.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Guard: the tag MUST match package.json's version. Without this, tagging
      # v6.1.0 on a commit whose package.json says 6.0.0 makes electron-builder
      # silently overwrite the OLD release's assets — and auto-update breaks
      # because installed apps see "6.0.0" as both current and latest.
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump package.json (and WB.VERSION in js/data.js) first."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (electron-builder)
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds. To enable macOS auto-update + notarization, add the
          # CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID secrets and remove this line.
          CSC_IDENTITY_AUTO_DISCOVERY: false
